name: satisfactory_field_notes
description: "Production planner + session notes for Satisfactory"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  shared_preferences: ^2.5.3
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data.json

  fonts:
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf
